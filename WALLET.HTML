<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ví Bonsai Pi</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #121212; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-dep { background: #ffbc00; color: black; }
        .back { color: #888; text-decoration: none; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="lobby.html" class="back">← Quay lại sảnh</a>
    <h2>NẠP PI VÀO TÀI KHOẢN</h2>
    <div class="box">
        <p style="font-size: 13px; color: #ffbc00;">Ví Admin: <b>GDUY...7F2K</b> (Mầy thay ví thật vào)</p>
        <input type="number" id="amount" placeholder="Số Pi đã chuyển">
        <input type="text" id="txid" placeholder="Dán mã TXID vào đây">
        <button class="btn btn-dep" onclick="sendNoti()">XÁC NHẬN ĐÃ CHUYỂN</button>
        <p style="font-size: 11px; color: #888; margin-top: 10px;">* Chờ 30 phút để Admin duyệt thủ công.</p>
    </div>

    <script>
        const TOKEN = '8352771211:AAG8A09yhuJqcy5wEXCiMUMkBNsEUOM5v5g'; // Token của mầy
        const CHAT_ID = '7359710522'; // ID của mầy

        async function sendNoti() {
            const a = document.getElementById('amount').value;
            const t = document.getElementById('txid').value;
            if(!a || !t) return alert("Nhập đủ mới duyệt được mậy!");

            const msg = `🔔 NẠP PI MỚI!\n💰 Số lượng: ${a} Pi\n🔑 TXID: ${t}`;
            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`;
            
            await fetch(url);
            alert("Đã báo Admin! Đợi tí nhé.");
            window.location.href='lobby.html';
        }
    </script>
</body>
</html>
