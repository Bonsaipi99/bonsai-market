<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .pi-box { background: rgba(255,188,0,0.1); border: 1px solid #ffbc00; padding: 5px 12px; border-radius: 20px; color: #ffbc00; font-weight: bold; font-size: 14px; }
        .card { background: #111; border-radius: 18px; border: 1px solid #222; padding: 15px; }
    </style>
</head>
<body>
    <header class="p-4 flex justify-between items-center border-b border-[#1a1a1a]">
        <div class="font-bold text-purple-500">BONSAIPI99</div>
        <div id="pi-balance" class="pi-box">0.00 Pi</div>
    </header>

    <div class="p-4">
        <div class="card mb-6 text-center">
            <h2 class="text-xl font-bold mb-2">WELCOME</h2>
            <p class="text-gray-500 text-xs">Manage your Pi balance easily.</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="wallet.html" class="card text-center">
                <div class="text-2xl mb-2">💰</div>
                <div class="text-xs font-bold uppercase">Deposit</div>
            </a>
            <div class="card text-center opacity-50">
                <div class="text-2xl mb-2">💸</div>
                <div class="text-xs font-bold uppercase">Withdraw</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc4oPPt2AQdn6AW85DRpQSIuMyK1oJDlQ",
            authDomain: "bonsaipi99.firebaseapp.com",
            databaseURL: "https://bonsaipi99-default-rtdb.firebaseio.com",
            projectId: "bonsaipi99",
            storageBucket: "bonsaipi99.firebasestorage.app",
            appId: "1:119041490462:web:5635dc57b3eb6b49afb80f"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        onValue(ref(database, 'balance'), (s) => {
            const d = s.val();
            const e = document.getElementById('pi-balance');
            if (e) {
                const v = (d !== null && (typeof d === 'number' || typeof d === 'string')) ? d : 0;
                e.innerText = v + ".00 Pi";
            }
        });
    </script>
</body>
</html>
