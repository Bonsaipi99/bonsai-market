<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sảnh Bonsai Pi</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #121212; color: white; }
        .header { display: flex; justify-content: space-between; padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; align-items: center; }
        .balance { color: #ffbc00; border: 1px solid #ffbc00; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: #1e1e1e; border-radius: 15px; text-align: center; padding-bottom: 10px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 100px; object-fit: cover; }
        .menu { position: fixed; bottom: 0; width: 100%; display: flex; background: #1a1a1a; padding: 10px 0; border-top: 1px solid #333; }
        .menu a { flex: 1; text-align: center; color: white; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <b style="color: #5e2d91;">BONSAI PI</b>
        <div class="balance">100.00 Pi</div>
    </div>

    <div class="grid">
        <div class="card" onclick="alert('Sắp ra mắt mầy ơi!')"><img src="https://via.placeholder.com/150/5e2d91/fff?text=Vong+Quay"><p>Vòng Quay</p></div>
        <div class="card" onclick="alert('Cây đang lớn, đợi tí!')"><img src="https://via.placeholder.com/150/222/fff?text=Bonsai"><p>Chợ Cây</p></div>
    </div>

    <div class="menu">
        <a href="lobby.html">🏠 Sảnh</a>
        <a href="wallet.html">💰 Nạp/Rút</a>
        <a href="index.html">🚪 Thoát</a>
    </div>
</body>
</html>
