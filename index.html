<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonsai Pi - Login</title>
    <style>
        :root { --picolor: #5e2d91; --blue: #4c84ff; --dark: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .bg-glow { position: absolute; width: 300px; height: 300px; background: var(--picolor); filter: blur(120px); opacity: 0.3; z-index: -1; }
        .logo { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--picolor)); }
        h1 { margin: 10px 0; letter-spacing: 2px; }
        .btn-open { background: linear-gradient(45deg, var(--picolor), #8e44ad); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(94, 45, 145, 0.4); transition: 0.3s; }
        .btn-open:active { transform: scale(0.95); }

        /* Bottom Sheet Đăng Nhập */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; backdrop-filter: blur(5px); z-index: 100; }
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #ffffff; border-radius: 30px 30px 0 0; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 101; padding: 30px 20px; box-sizing: border-box; color: #333; text-align: center; }
        .sheet.active { bottom: 0; }
        .handle { width: 50px; height: 6px; background: #e0e0e0; margin: -10px auto 25px; border-radius: 10px; }
        .input-group { position: relative; margin-bottom: 15px; width: 100%; }
        input { width: 90%; padding: 15px; border-radius: 15px; border: 1px solid #ddd; background: #f8f9fa; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--picolor); box-shadow: 0 0 8px rgba(94, 45, 145, 0.2); }
        .btn-login { width: 90%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .google-login { display: flex; align-items: center; justify-content: center; width: 90%; margin: 20px auto; padding: 12px; border: 1px solid #ddd; border-radius: 15px; font-weight: 500; cursor: pointer; }
        .google-login img { width: 20px; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <img src="https://minepi.com/wp-content/uploads/2023/11/pi-logo-600.png" class="logo">
    <h1>LUCK 8 - PI</h1>
    <p style="color: #aaa; font-size: 14px;">Sảnh game và bonsai đẳng cấp</p>
    <button class="btn-open" onclick="toggleSheet(true)">Click để đăng nhập / đăng ký</button>

    <div id="overlay" onclick="toggleSheet(false)"></div>
    <div class="sheet" id="loginSheet">
        <div class="handle"></div>
        <h2 style="margin-bottom: 25px;">Chào mừng mầy trở lại!</h2>
        <div class="input-group"><input type="text" placeholder="Tên tài khoản hoặc Email"></div>
        <div class="input-group"><input type="password" placeholder="Mật khẩu"></div>
        <button class="btn-login" onclick="location.href='lobby.html'">ĐĂNG NHẬP NGAY</button>
        <div class="google-login" onclick="location.href='lobby.html'">
            <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png"> Đăng nhập với Google
        </div>
        <p style="color: #888; font-size: 13px;">Chưa có tài khoản? <span style="color: var(--blue);">Đăng ký ngay</span></p>
    </div>

    <script>
        function toggleSheet(show) {
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
            document.getElementById('loginSheet').classList.toggle('active', show);
        }
    </script>
</body>
</html>
