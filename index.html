<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BONSAIPI99 - Welcome</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --picolor: #5e2d91; --dark: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .welcome-box { text-align: center; width: 100%; padding: 20px; }
        .logo { width: 110px; filter: drop-shadow(0 0 15px var(--picolor)); margin-bottom: 20px; }
        h1 { font-size: 30px; letter-spacing: 2px; margin: 0; font-weight: 900; }
        .btn-open { background: linear-gradient(45deg, #5e2d91, #8e44ad); color: white; border: none; padding: 18px 50px; border-radius: 50px; font-weight: bold; margin-top: 30px; cursor: pointer; width: 80%; max-width: 300px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* Bảng trượt đăng nhập */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 10; backdrop-filter: blur(5px); }
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; border-radius: 25px 25px 0 0; transition: 0.4s ease-out; z-index: 11; padding: 30px 25px; box-sizing: border-box; color: #333; }
        .sheet.active { bottom: 0; }
        .bar { width: 40px; height: 4px; background: #e0e0e0; margin: -10px auto 25px; border-radius: 10px; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ddd; background: #f5f5f5; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn-go { width: 100%; padding: 16px; background: #5e2d91; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div class="welcome-box">
        <img src="https://minepi.com/wp-content/uploads/2023/11/pi-logo-600.png" class="logo">
        <h1>BONSAIPI99</h1>
        <p style="color: #666; margin-top: 10px;">Hệ Thống Bonsai & Game Pi Browser</p>
        <button class="btn-open" onclick="toggleSheet(true)">BẤT ĐẦU NGAY</button>
    </div>

    <div id="overlay" onclick="toggleSheet(false)"></div>
    <div class="sheet" id="loginSheet">
        <div class="bar"></div>
        <h2 style="text-align: center; margin-bottom: 20px;">Đăng Nhập Hệ Thống</h2>
        <input type="text" id="piName" placeholder="Tên tài khoản Pi của mầy">
        <input type="password" placeholder="Mật khẩu bảo mật">
        <button class="btn-go" onclick="startApp()">VÀO SẢNH CHÍNH</button>
    </div>

    <script>
        Pi.init({ version: "2.0", sandbox: true });
        function toggleSheet(show) {
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
            document.getElementById('loginSheet').classList.toggle('active', show);
        }
        function startApp() {
            const val = document.getElementById('piName').value;
            if(!val) return alert("Mầy chưa nhập tên!");
            localStorage.setItem('user99', val);
            window.location.href = 'lobby.html';
        }
    </script>
</body>
</html>
</html>
