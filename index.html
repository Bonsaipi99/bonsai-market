<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BONSAIPI99 - OFFICIAL APP</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --main: #5e2d91; --sub: #8e44ad; --dark: #050505; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--dark); color: var(--white); margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Hiệu ứng nền chuyển động */
        .bg-glow { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; background: var(--main); filter: blur(120px); opacity: 0.3; z-index: 1; }
        
        .content { z-index: 10; text-align: center; width: 100%; padding: 0 40px; }
        .logo-box { position: relative; display: inline-block; margin-bottom: 30px; }
        .logo-img { width: 120px; filter: drop-shadow(0 0 20px var(--main)); animation: pulse 2.5s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        
        h1 { font-size: 36px; font-weight: 900; letter-spacing: 4px; margin: 0; text-transform: uppercase; background: linear-gradient(to bottom, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .slogan { color: #888; font-size: 14px; margin-top: 10px; font-weight: 300; }
        
        .btn-start { margin-top: 50px; background: linear-gradient(135deg, var(--main), var(--sub)); color: white; border: none; padding: 20px 0; width: 100%; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 15px 35px rgba(94, 45, 145, 0.4); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-start:active { transform: scale(0.95); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* Bảng trượt Bottom Sheet chi tiết */
        #mask { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; z-index: 100; opacity: 0; transition: 0.3s; }
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #ffffff; border-radius: 30px 30px 0 0; transition: 0.5s cubic-bezier(0, 1, 0.5, 1); z-index: 101; padding: 40px 30px; color: #222; }
        .sheet.show { bottom: 0; }
        .sheet-bar { width: 50px; height: 6px; background: #e0e0e0; border-radius: 10px; margin: -20px auto 30px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; color: #999; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid #f0f0f0; background: #f9f9f9; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--main); background: #fff; }
        
        .btn-confirm { width: 100%; padding: 18px; background: #111; color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; margin-top: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        #loading-screen { position: fixed; inset: 0; background: var(--dark); z-index: 999; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
    </style>
</head>
<body>
    <div id="loading-screen"><b>VUI LÒNG ĐỢI...</b></div>
    <div class="bg-glow"></div>
    
    <div class="content">
        <div class="logo-box">
            <img src="https://minepi.com/wp-content/uploads/2023/11/pi-logo-600.png" class="logo-img">
        </div>
        <h1>BONSAIPI99</h1>
        <div class="slogan">THE NEXT GEN OF PI ECOSYSTEM</div>
        <button class="btn-start" onclick="openSheet()">BẮT ĐẦU NGAY</button>
    </div>

    <div id="mask" onclick="closeSheet()"></div>
    <div class="sheet" id="sheet">
        <div class="sheet-bar"></div>
        <h2 style="margin: 0 0 10px; font-size: 24px;">Xin chào mầy!</h2>
        <p style="color: #666; margin-bottom: 30px; font-size: 14px;">Vui lòng nhập định danh để tiếp tục vào sảnh chính.</p>
        
        <div class="form-group">
            <label>Username Pi</label>
            <input type="text" id="uname" placeholder="Ví dụ: bonsaimaster99">
        </div>
        
        <div class="form-group">
            <label>Mật mã sảnh</label>
            <input type="password" id="upass" placeholder="Nhập pass sảnh (nếu có)">
        </div>
        
        <button class="btn-confirm" onclick="handleAuth()">XÁC NHẬN TRUY CẬP</button>
    </div>

    <script>
        // Khởi tạo Pi SDK chuyên sâu
        window.onload = () => {
            setTimeout(() => { document.getElementById('loading-screen').style.opacity = '0'; 
            setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 500); }, 1000);
            
            try {
                Pi.init({ version: "2.0", sandbox: true });
                console.log("Pi SDK đã sẵn sàng!");8
            } catch(e) { console.error("Lỗi khởi tạo SDK"); }
        }

        function openSheet() {
            document.getElementById('mask').style.display = 'block';
            setTimeout(() => { document.getElementById('mask').style.opacity = '1'; }, 10);
            document.getElementById('sheet').classList.add('show');
        }

        function closeSheet() {
            document.getElementById('mask').style.opacity = '0';
            setTimeout(() => { document.getElementById('mask').style.display = 'none'; }, 300);
            document.getElementById('sheet').classList.remove('show');
        }

        function handleAuth() {
            const user = document.getElementById('uname').value;
            if(!user || user.length < 3) return alert("Mầy nhập tên cho đàng hoàng coi!");
            
            localStorage.setItem('bonsaipi99_session', user);
            window.location.href = 'lobby.html';
        }
    </script>
</body>
</html>
