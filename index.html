<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonsai Pi Center - Sảnh VIP</title>
    <style>
        :root { --picolor: #5e2d91; --blue: #4c84ff; --dark: #121212; }
        body { font-family: sans-serif; margin: 0; background: var(--dark); color: white; overflow: hidden; }

        /* MÀN HÌNH CHÀO (WELCOME) */
        .welcome-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: linear-gradient(to bottom, #1a1a1a, #000); }
        .logo-main { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--picolor)); border-radius: 20px; }
        .entry-btn { background: var(--picolor); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(94,45,145,0.5); transition: 0.3s; }
        .entry-btn:active { transform: scale(0.95); }

        /* LỚP PHỦ ĐEN KHI HIỆN BẢNG */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; }

        /* BẢNG TRƯỢT (BOTTOM SHEET) - CHUẨN MẪU MẦY GỬI */
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; border-radius: 25px 25px 0 0; transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1); z-index: 1001; color: #333; padding-bottom: 30px; }
        .bottom-sheet.active { bottom: 0; }
        
        /* THANH KÉO TRÊN ĐẦU BẢNG */
        .handle { width: 45px; height: 5px; background: #ddd; border-radius: 10px; margin: 12px auto; cursor: pointer; }
        
        /* TAB ĐĂNG NHẬP / ĐĂNG KÝ */
        .tab-header { display: flex; justify-content: space-around; font-weight: bold; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .tab-header div { padding: 12px 25px; cursor: pointer; color: #888; position: relative; }
        .tab-header .active-tab { color: var(--blue); }
        .tab-header .active-tab::after { content: ""; position: absolute; bottom: 0; left: 20%; width: 60%; height: 3px; background: var(--blue); border-radius: 5px; }

        /* FORM NHẬP LIỆU */
        .form-group { padding: 10px 25px; }
        .input-box { width: 100%; padding: 14px 20px; margin: 8px 0; border-radius: 30px; border: 1px solid #e0e0e0; background: #f8f9fa; box-sizing: border-box; outline: none; font-size: 15px; }
        .btn-submit { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 30px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(76, 132, 255, 0.3); }
        
        .btn-google { width: 100%; padding: 12px; background: white; border: 1px solid #ddd; border-radius: 30px; margin-top: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div class="welcome-screen">
        <img src="https://minepi.com/wp-content/uploads/2023/11/pi-logo-600.png" class="logo-main">
        <h1 style="margin: 0; letter-spacing: 2px; text-transform: uppercase;">BONSAI PI</h1>
        <p style="color: #888; margin-top: 5px; margin-bottom: 40px; font-size: 14px;">Chợ Bonsai & Game Giải Trí</p>
        <button class="entry-btn" onclick="openLogin()">Click để đăng nhập / đăng ký</button>
    </div>

    <div id="overlay" onclick="closeLogin()"></div>

    <div class="bottom-sheet" id="loginSheet">
        <div class="handle" onclick="closeLogin()"></div>
        
        <div class="tab-header">
            <div class="active-tab" id="tabIn" onclick="toggleTab('in')">Đăng nhập</div>
            <div id="tabUp" onclick="toggleTab('up')">Đăng ký</div>
        </div>

        <div class="form-group">
            <div id="loginForm">
                <input type="text" class="input-box" placeholder="Tên tài khoản hoặc Email">
                <input type="password" class="input-box" placeholder="Mật khẩu">
                <div style="text-align: right; font-size: 12px; color: #888; margin: 5px 10px;">Quên mật khẩu?</div>
                <button class="btn-submit" onclick="finishLogin()">ĐĂNG NHẬP NGAY</button>
            </div>

            <div id="registerForm" style="display: none;">
                <input type="text" class="input-box" placeholder="Tên đăng nhập (6-15 ký tự)">
                <input type="password" class="input-box" placeholder="Mật khẩu bảo mật">
                <input type="tel" class="input-box" placeholder="Số điện thoại liên kết">
                <input type="text" class="input-box" placeholder="Họ tên (Trùng ví Pi/Ngân hàng)">
                <button class="btn-submit" onclick="finishLogin()">TẠO TÀI KHOẢN</button>
            </div>

            <div style="text-align: center; margin: 20px 0 10px; color: #bbb; font-size: 13px; position: relative;">
                <span style="background: white; padding: 0 10px; position: relative; z-index: 2;">Hoặc</span>
                <hr style="position: absolute; top: 50%; width: 100%; border: 0; border-top: 1px solid #eee; z-index: 1;">
            </div>
            
            <button class="btn-google" onclick="finishLogin()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18" style="margin-right: 10px;"> Tiếp tục với Google
            </button>
        </div>
    </div>

    <script>
        function openLogin() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('loginSheet').classList.add('active');
        }

        function closeLogin() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('loginSheet').classList.remove('active');
        }

        function toggleTab(type) {
            const loginForm = document.getElementById('loginForm');
            const regForm = document.getElementById('registerForm');
            const tabIn = document.getElementById('tabIn');
            const tabUp = document.getElementById('tabUp');

            if(type === 'in') {
                loginForm.style.display = 'block';
                regForm.style.display = 'none';
                tabIn.classList.add('active-tab');
                tabUp.classList.remove('active-tab');
            } else {
                loginForm.style.display = 'none';
                regForm.style.display = 'block';
                tabIn.classList.remove('active-tab');
                tabUp.classList.add('active-tab');
            }
        }

        function finishLogin() {
            alert("Vô sảnh thôi mậy! Chúc mầy thắng lớn.");
            // Ở đây mầy cho chuyển sang file lobby.html của mầy
            window.location.href = "lobby.html";
        }
    </script>
</body>
</html>
