<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonsai Pi99 Premium</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e8f5e9; margin: 0; padding: 0; }
        .header { background: #2e7d32; color: white; padding: 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 20px; text-align: center; }
        .card-info h3 { margin: 10px 0; color: #1b5e20; }
        .price { color: #f57c00; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .btn-buy { background: linear-gradient(135deg, #ffa000, #ff6f00); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 5px 15px rgba(255, 111, 0, 0.3); }
        .btn-buy:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌿 BONSAI PI99 MARKET</h1>
        <p>Thế giới cây cảnh - Thanh toán bằng Pi</p>
    </div>

    <div class="container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1512428813834-c702c7702b78?auto=format&fit=crop&w=500" alt="Bonsai 1">
            <div class="card-info">
                <h3>Tùng La Hán Dáng Văn Nhân</h3>
                <div class="price">1.5 Pi</div>
                <button class="btn-buy" onclick="alert('Đang kết nối ví Pi...')">MUA NGAY</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1599591037488-dc7169438901?auto=format&fit=crop&w=500" alt="Bonsai 2">
            <div class="card-info">
                <h3>Mai Chiếu Thủy Cổ Thụ</h3>
                <div class="price">3.2 Pi</div>
                <button class="btn-buy" onclick="alert('Đang kết nối ví Pi...')">MUA NGAY</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=500" alt="Bonsai 3">
            <div class="card-info">
                <h3>Linh Sam Thác Đổ</h3>
                <div class="price">2.8 Pi</div>
                <button class="btn-buy" onclick="alert('Đang kết nối ví Pi...')">MUA NGAY</button>
            </div>
        </div>
    </div>
</body>
</html>
