<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chợ Bonsai Pi99</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2e7d32; }
        .product { border-bottom: 1px solid #ddd; padding: 15px 0; display: flex; align-items: center; justify-content: space-between; }
        .btn-pay { background-color: #ffa000; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-pay:hover { background-color: #ff8f00; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌿 Chợ Bonsai Pi99</h1>
        <p>Chào mừng mầy đến với tiệm cây cảnh thanh toán bằng Pi!</p>
        
        <div class="product">
            <div><strong>1. Thuốc kích rễ cực mạnh</strong><br>Giá: 0.5 Pi</div>
            <button class="btn-pay" onclick="alert('Đang kết nối ví Pi...')">Mua bằng Pi</button>
        </div>

        <div class="product">
            <div><strong>2. Phân bón hữu cơ Nhật</strong><br>Giá: 1.0 Pi</div>
            <button class="btn-pay" onclick="alert('Đang kết nối ví Pi...')">Mua bằng Pi</button>
        </div>

        <div class="product">
            <div><strong>3. Đất trồng Bonsai chuyên dụng</strong><br>Giá: 0.8 Pi</div>
            <button class="btn-pay" onclick="alert('Đang kết nối ví Pi...')">Mua bằng Pi</button>
        </div>
    </div>
</body>
</html>
