<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCK 8 - PI NETWORK</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --picolor: #5e2d91; --bg: #0d0d0d; --text: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { text-align: center; width: 100%; padding: 20px; z-index: 2; }
        .logo-pi { width: 110px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--picolor)); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        h1 { font-size: 28px; margin: 0; letter-spacing: 3px; font-weight: 800; }
        .sub { color: #888; margin: 10px 0 30px; font-size: 14px; }
        .btn-main { background: linear-gradient(135deg, #5e2d91 0%, #3a1c59 100%); color: white; border: none; padding: 18px 45px; border-radius: 50px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: 0.3s; }
        
        /* Hiệu ứng Bottom Sheet */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: none; z-index: 10; }
        .sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #ffffff; border-radius: 30px 30px 0 0; transition: 0.5s cubic-bezier(0, 1, 0.5, 1); z-index: 11; padding: 35px 25px; box-sizing: border-box; color: #222; }
        .sheet.active { bottom: 0; }
        .handle { width: 45px; height: 5px; background: #ddd; border-radius: 10px; margin: -15px auto 25px; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #eee; background: #f9f9f9; font-size: 16px; box-sizing: border-box; }
        .btn-go { width: 100%; padding: 16px; background: #4c84ff; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://minepi.com/wp-content/uploads/2023/11/pi-logo-600.png" class="logo-pi">
        <h1>LUCK 8 - PI</h1>
        <p class="sub">Hệ thống Bonsai & Game đẳng cấp Pi Network</p>
        <button class="btn-main" onclick="openLogin()">BẮT ĐẦU NGAY</button>
    </div>

    <div id="overlay" onclick="closeLogin()"></div>
    <div class="sheet" id="loginSheet">
        <div class="handle"></div>
        <h2 style="margin: 0 0 20px; text-align: center;">Đăng nhập</h2>
        <input type="text" id="user" placeholder="Tên tài khoản Pi">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button class="btn-go" onclick="handleLogin()">XÁC NHẬN VÀO SẢNH</button>
    </div>

    <script>
        // Khởi tạo Pi SDK (Cái móng nhà đây mầy!)
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        function openLogin() { 
            document.getElementById('overlay').style.display='block'; 
            document.getElementById('loginSheet').classList.add('active'); 
        }
        function closeLogin() { 
            document.getElementById('overlay').style.display='none'; 
            document.getElementById('loginSheet').classList.remove('active'); 
        }
        function handleLogin() {
            const u = document.getElementById('user').value;
            if(!u) return alert("Nhập tên mới vào được mậy!");
            // Lưu tên vào máy để các trang sau dùng
            localStorage.setItem('piUser', u);
            window.location.href='lobby.html';
        }
    </script>
</body>
</html>
