<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao dịch BONSAIPI99</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; padding: 20px; margin: 0; }
        .card { background: #151515; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #333; margin-bottom: 20px; }
        .pi { font-size: 30px; font-weight: bold; color: #ffbc00; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 18px; background: #5e2d91; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .addr-box { background: #222; padding: 10px; border-radius: 8px; color: #ffbc00; font-family: monospace; font-size: 11px; margin-bottom: 15px; word-break: break-all; border: 1px dashed #444; }
    </style>
</head>
<body>
    <div style="margin-bottom:20px;"><a href="lobby.html" style="color:#888; text-decoration:none;">← Quay lại</a></div>
    
    <div class="card">
        <div style="font-size:12px; opacity:0.6;">SỐ DƯ HIỆN TẠI</div>
        <div class="pi" id="pi-balance">0.00 Pi</div>
    </div>

    <div class="card" style="text-align:left;">
        <h3 id="title" style="margin-top:0; color:#ffbc00;">GIAO DỊCH</h3>
        <div id="nap-extra" style="display:none;">
            <p style="font-size:12px; color:#888; margin-bottom:5px;">Ví Admin nhận Pi:</p>
            <div class="addr-box">GDUY7O2N...Q7F2K</div>
        </div>
        <input type="number" id="a" placeholder="Số lượng Pi">
        <input type="text" id="t" placeholder="Chi tiết">
        <button class="btn" onclick="send()">GỬI YÊU CẦU</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || 'nap';

        if(type === 'nap') {
            document.getElementById('title').innerText = "NẠP PI";
            document.getElementById('nap-extra').style.display = "block";
            document.getElementById('t').placeholder = "Dán mã TXID vào đây";
        } else {
            document.getElementById('title').innerText = "RÚT PI";
            document.getElementById('t').placeholder = "Nhập ví Pi nhận tiền";
        }

        async function send() {
            const amt = document.getElementById('a').value;
            const det = document.getElementById('t').value;
            const user = localStorage.getItem('user99') || 'Khách';

            if(!amt || !det) return alert("Mầy điền thiếu thông tin!");

            const token = '8352771211:AAG8A09yhuJqcy5wEXCiMUMkBNsEUOM5v5g';
            const chatid = '7359710522';
            const action = type === 'nap' ? "NẠP PI" : "RÚT PI";
            
            const msg = `🔔 **YÊU CẦU ${action}**\n👤 User: \`${user}\`\n💰 Số lượng: \`${amt}\` Pi\n🔑 Chi tiết: \`${det}\``;
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatid}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;

            try {
                await fetch(url);
                alert("Đã gửi! Admin sẽ check Telegram.");
                window.location.href = 'lobby.html';
            } catch(e) { alert("Lỗi mạng mầy ơi!"); }
        }
    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBc4oPPt2AQdn6AW85DRpQSIuMyK1oJDlQ",
    authDomain: "bonsaipi99.firebaseapp.com",
    databaseURL: "https://bonsaipi99-default-rtdb.firebaseio.com",
    projectId: "bonsaipi99",
    storageBucket: "bonsaipi99.firebasestorage.app",
    appId: "1:119041490462:web:5635dc57b3eb6b49afb80f"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  onValue(ref(database, 'balance'), (snapshot) => {
    const data = snapshot.val();
    const display = document.getElementById('pi-balance');
    if (display) {
      display.innerText = (data ? data : "0") + ".00 Pi";
    }
  });
</script>
