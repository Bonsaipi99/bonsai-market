<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nạp Pi - BONSAIPI99</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .pi-box { background: rgba(255,188,0,0.1); border: 1px solid #ffbc00; padding: 15px; border-radius: 12px; text-align: center; color: #ffbc00; font-weight: bold; font-size: 20px; }
        .input-field { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px; width: 100%; margin-bottom: 15px; color: #fff; }
        .btn-pay { background: #6d28d9; color: #fff; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body class="p-4">

    <div class="mb-6">
        <a href="lobby.html" class="text-gray-400 text-sm">← Quay lại</a>
    </div>

    <div class="text-center mb-6">
        <p class="text-gray-400 text-xs uppercase">Số dư hiện tại</p>
        <div id="pi-balance" class="pi-box">0.00 Pi</div>
    </div>

    <div class="bg-[#0a0a0a] p-4 rounded-xl border border-[#1a1a1a]">
        <h2 class="text-[#ffbc00] font-bold mb-4 uppercase text-sm">Giao dịch</h2>
        
        <p class="text-gray-500 text-xs mb-1">Ví Admin nhận Pi:</p>
        <div class="bg-[#111] p-2 rounded text-[10px] text-gray-400 mb-4 break-all">
            GDUY7G2N...Q7P2K
        </div>

        <input type="number" id="amount" class="input-field" placeholder="Số lượng Pi">
        <input type="text" id="txid" class="input-field" placeholder="Dán mã TXID vào đây">
        
        <button onclick="sendRequest()" class="btn-pay">GỬI YÊU CẦU</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc4oPPt2AQdn6AW85DRpQSIuMyK1oJDlQ",
            authDomain: "bonsaipi99.firebaseapp.com",
            databaseURL: "https://bonsaipi99-default-rtdb.firebaseio.com",
            projectId: "bonsaipi99",
            storageBucket: "bonsaipi99.firebasestorage.app",
            appId: "1:119041490462:web:5635dc57b3eb6b49afb80f"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Đọc số dư từ Firebase
        onValue(ref(database, 'balance'), (s) => {
            const d = s.val();
            const e = document.getElementById('pi-balance');
            if (e) {
                const val = (d !== null && (typeof d === 'number' || typeof d === 'string')) ? d : 0;
                e.innerText = val + ".00 Pi";
            }
        });

        // Xử lý nút bấm
        window.sendRequest = function() {
            const a = document.getElementById('amount').value;
            const t = document.getElementById('txid').value;
            if (!a || !t) {
                alert("Nhi ơi, nhập đủ số Pi và TXID nha!");
                return;
            }
            alert("Gửi thành công! Đang chờ duyệt: " + a + " Pi");
            document.getElementById('amount').value = "";
            document.getElementById('txid').value = "";
        };
    </script>
</body>
</html>
