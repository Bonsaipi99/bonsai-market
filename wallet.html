<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .pi-box { background: rgba(255,188,0,0.1); border: 1px solid #ffbc00; padding: 15px; border-radius: 12px; text-align: center; color: #ffbc00; font-weight: bold; font-size: 20px; }
        .input-field { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px; width: 100%; margin-bottom: 15px; color: #fff; outline: none; }
        .btn-pay { background: #6d28d9; color: #fff; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body class="p-4">
    <div class="mb-6"><a href="lobby.html" class="text-gray-400 text-sm">← Back</a></div>
    <div class="text-center mb-6">
        <p class="text-gray-400 text-[10px] uppercase">Balance</p>
        <div id="pi-balance" class="pi-box">0.00 Pi</div>
    </div>
    <div class="bg-[#0a0a0a] p-4 rounded-xl border border-[#1a1a1a]">
        <h2 class="text-[#ffbc00] font-bold mb-4 uppercase text-sm">Deposit</h2>
        <input type="number" id="amount" class="input-field" placeholder="Amount Pi">
        <input type="text" id="txid" class="input-field" placeholder="TXID">
        <button id="btn-send" class="btn-pay">SEND REQUEST</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc4oPPt2AQdn6AW85DRpQSIuMyK1oJDlQ",
            authDomain: "bonsaipi99.firebaseapp.com",
            databaseURL: "https://bonsaipi99-default-rtdb.firebaseio.com",
            projectId: "bonsaipi99",
            storageBucket: "bonsaipi99.firebasestorage.app",
            appId: "1:119041490462:web:5635dc57b3eb6b49afb80f"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        onValue(ref(database, 'balance'), (s) => {
            const d = s.val();
            const e = document.getElementById('pi-balance');
            if (e) {
                const v = (d !== null && (typeof d === 'number' || typeof d === 'string')) ? d : 0;
                e.innerText = v + ".00 Pi";
            }
        });

        document.getElementById('btn-send').onclick = async function() {
            const a = document.getElementById('amount').value;
            const t = document.getElementById('txid').value;
            const token = "7547194689:AAH-6mJ-971EwS0pYVf8m9qR7t_Xv6U9u9I";
            const chatid = "6198947087";

            if (!a || !t) {
                alert("Fill all fields!");
                return;
            }

            const msg = `🔔 NEW DEPOSIT\nAmount: ${a} Pi\nTXID: ${t}`;
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatid}&text=${encodeURIComponent(msg)}`;

            try {
                const r = await fetch(url);
                const res = await r.json();
                if(res.ok) {
                    alert("Success!");
                    document.getElementById('amount').value = "";
                    document.getElementById('txid').value = "";
                } else {
                    alert("Tele Error: " + res.description);
                }
            } catch (err) {
                alert("Network Error!");
            }
        };
    </script>
</body>
</html>
